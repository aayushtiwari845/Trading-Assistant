services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../reports:/app/reports
      - ../../chroma:/app/chroma
    depends_on:
      - redis
      - postgres

  ui:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ui
    env_file:
      - ../../.env
    ports:
      - "8501:8501"
    depends_on:
      - api

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trading_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

